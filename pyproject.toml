[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long — enforced by formatter, not linter
    "UP007",  # X | Y union syntax — keep Optional[] for clarity
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811"]  # allow redefinition in test fixtures

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
